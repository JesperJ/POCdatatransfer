# Production overrides — Traefik routing, resource limits, restart always.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Env file expected on host at: /etc/datatransfer/.env.prod

services:
  api:
    env_file:
      - .env.prod
    volumes:
      - /home/jesper/.POCdatatransfers:/config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.datatransfer.rule=Host(`datatransfer.poc.internal`)"
      - "traefik.http.routers.datatransfer.entrypoints=websecure"
      - "traefik.http.routers.datatransfer.tls=true"
      - "traefik.http.services.datatransfer.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: always
