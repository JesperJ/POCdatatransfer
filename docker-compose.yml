# Base configuration — always used, combined with an environment-specific override.
# Do NOT run this file alone. Use:
#   docker compose -f docker-compose.yml -f docker-compose.<env>.yml up -d

services:
  api:
    image: datatransfer-api:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik-public:
    external: true
