# Staging overrides — Traefik routing to staging domain, single replica.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# Env file expected on host at: /etc/datatransfer/.env.staging

services:
  api:
    env_file:
      - .env.staging
    volumes:
      - /home/jesper/.POCdatatransfers:/config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.datatransfer-staging.rule=Host(`staging.datatransfer.poc.internal`)"
      - "traefik.http.routers.datatransfer-staging.entrypoints=websecure"
      - "traefik.http.routers.datatransfer-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.datatransfer-staging.loadbalancer.server.port=8080"
