# Traefik static configuration
# Docs: https://doc.traefik.io/traefik/

api:
  dashboard: false   # set to true + add auth middleware to enable dashboard

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    transport:
      lifeCycle:
        graceTimeOut: 10s   # drain in-flight requests before shutdown

providers:
  docker:
    exposedByDefault: false   # services must opt in via traefik.enable=true label
    network: traefik-public
  file:
    directory: /etc/traefik/dynamic
    watch: true              # hot-reload dynamic config without restarting Traefik

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL}
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
